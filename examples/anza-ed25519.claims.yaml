guarantees:
- FieldElement51 arithmetic is checked through denotation over F_p, p = 2^255 - 19,
  for the configured backend.
- Complete twisted Edwards point-operation laws are checked under ExtValid and OnCurveExt
  invariants.
- Scalar arithmetic mod l (add, sub, Montgomery mul, wide hash-to-scalar reduction)
  is checked through denotation.
- Point compression emits the canonical encoding (to_bytes canonicity + compress semantics
  are certified).
- 'Point decompression is constructively certified: canonical encodings of valid on-curve
  points decompress to them (from_bytes exactness, sqrt_ratio_i even root, sign-bit
  selection).'
- 'THE SIGNATURE APEX, four button-enforced tiers: the extracted verifier accepts
  iff compress([s]B - [k]A) = R byte-for-byte, iff R is the canonical encoding of
  [k](-A) + [s]B, iff any point canonically encoded by R equals it, and iff R decompresses
  to a valid on-curve point equal to it.'
- Each apex tier's axiom cone is pinned to EXACTLY the fork's documented SHA-512/wire-format
  boundary by the repo's own check script.
- Panic and overflow freedom evidence applies under the stated limb-bound preconditions.
preconditions:
- Use the exact pinned source or a reviewed diff against the checked artifact.
- Use the configured serial/u64 backend unless another backend has its own certificate.
- Maintain limb bounds and representation invariants required by the Lean statements.
- Treat Charon/Aeneas translation faithfulness as trusted base, not as proven by this
  tool.
- 'Map the production entry point to the verified path explicitly (on anza: verify_sha512
  = verify_dalek, NOT the default HEEA/Zebra verify()).'
exclusions:
- SHA-512 itself is not verified; it enters the apex theorems as an opaque oracle
  with NO assumed properties (the theorems hold for whatever bytes it produces).
- 'Signature parse/filter outcomes are hypothesis-parametric: the apex tiers assume
  the wire parse succeeded; the parsers'' own byte-level specs are separate work.'
- Signing (key generation, nonce derivation, the signer) is out of scope; only verification
  is certified.
- Rust compiler correctness is out of scope.
- Charon/Aeneas translation faithfulness is out of scope.
- Side-channel resistance is out of scope.
- SIMD, AVX, hardware, zkVM, accelerator, and syscall paths are out of scope (extraction
  pins the serial path).
- Wallet policy, transaction construction, RPC, oracle, market, and LLM decision safety
  are out of scope.
- Solana runtime semantics
- Solana transaction construction
- the default HEEA/Zebra verify() path
- accelerator paths
trusted_base:
- Lean kernel and standard library axioms.
- Lake/Lean package resolution used for replay.
- Correctness of the shipped Rust-to-Lean translation artifact.
- Correct mapping from the production code path to the checked backend.
- 'The fork''s documented apex boundary: the SHA-512 oracle and opaque wire-format
  types (enforced per certificate by the repo''s check script).'
- Operating system, filesystem, and subprocess execution environment.
