risk:
  level: R4
  rationale: The full four-tier signature apex (byte apex, half-lift, point equation,
    full decompress lift) plus the constructive encoding/decoding chain and scalar
    arithmetic are proven with every certificate's axiom cone pinned to its documented
    boundary. Residual R5 gaps are listed as blockers.
  blockers:
  - SHA-512 enters the apex theorems as an opaque oracle; the hash implementation
    itself is unverified.
  - Wire parse/filter outcomes are hypothesis-parametric; parser byte-level specs
    are not yet certified.
  - Charon/Aeneas translation faithfulness and the production-path-to-verified-path
    mapping remain trusted base.
  - No side-channel, reproducible-build, or operational assurance (those gate R5).
  deployment_constraints:
  - Use exact pinned source or reviewed diff.
  - Use verified serial/u64 backend only.
  - Disable accelerator, syscall, hardware, SIMD, and AVX paths unless separately
    certified.
  - 'Verification-side evidence only: keep signing/key custody behind HSM, MPC, or
    policy firewall.'
  - SHA-512 remains an unverified dependency; pin and monitor the hash implementation.
  - Use ordinary tests and fuzzing at wire-parse, API, and transaction boundaries
    (parse specs are hypothesis-parametric).
  - verified entry point is verify_sha512 = verify_dalek (canonical-R incl. legacy
    filters); the crate's default HEEA/Zebra verify() is a DIFFERENT acceptance criterion
    and is not covered
